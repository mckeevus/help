<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lifts">
<link rel="manifest" href="lifts.webmanifest">
<link rel="apple-touch-icon" href="lifts-icon.png">
<title>Lifts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#11151c; --muted:#6b7280; --faint:#aab1bd;
    --line:#e7eaef; --accent:#2563eb; --accent-dark:#1d4ed8; --accent-soft:#e8efff;
    --green:#16a34a; --green-soft:#e7f6ec; --red:#dc2626; --amber:#d97706; --gold:#b8860b; --gold-soft:#fdf3d7;
    --radius:14px;
  }
  html,body{height:100%;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;background:var(--bg);position:relative;}
  .screen{flex:1;overflow-y:auto;padding:0 16px 120px;display:none;}
  .screen.active{display:block;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 0 10px;position:sticky;top:0;background:var(--bg);z-index:6;}
  .topbar h1{font-size:26px;font-weight:800;letter-spacing:-0.02em;}
  .topbar .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .gear{font-size:22px;color:var(--muted);padding:4px 6px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .btn{background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px;border-radius:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
  .btn:active{background:var(--accent-dark);}
  .btn.green{background:var(--green);}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);}
  .btn.ghost.red{color:var(--red);border-color:#f3c9c9;}
  .btn.sm{padding:10px 12px;font-size:13px;border-radius:10px;width:auto;}
  .row{display:flex;gap:10px;}.row>*{flex:1;}
  .sec-label{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:18px 4px 10px;}

  .listitem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;}
  .listitem:active{background:var(--bg);}
  .listitem .grow{flex:1;min-width:0;}
  .listitem .t{font-weight:600;font-size:15px;}
  .listitem .s{font-size:12px;color:var(--muted);margin-top:2px;}
  .chev{color:var(--faint);font-size:18px;}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  .empty .big{font-size:34px;margin-bottom:10px;}

  .ex-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .ex-head{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .ex-head .glabel{font-size:12px;font-weight:800;color:#fff;background:var(--accent);border-radius:7px;padding:3px 7px;min-width:30px;text-align:center;}
  .ex-head .name{font-weight:700;font-size:16px;flex:1;color:var(--accent-dark);}
  .ex-head .x{color:var(--faint);font-size:20px;padding:2px 6px;}
  .target-line{font-size:12px;color:var(--muted);margin:2px 0 10px;line-height:1.5;}
  .target-line b{color:var(--ink);}
  .note-line{font-size:12px;color:var(--muted);font-style:italic;margin:0 0 10px;line-height:1.5;}
  .set-grid{display:grid;grid-template-columns:28px 1fr 1fr 30px 38px;gap:7px;align-items:center;margin-bottom:7px;}
  .set-grid.hdr{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--faint);letter-spacing:.04em;margin-bottom:4px;}
  .set-grid.hdr>div{text-align:center;}
  .set-grid input{width:100%;text-align:center;padding:10px 4px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-weight:600;background:var(--bg);}
  .set-grid input:focus{outline:none;border-color:var(--accent);background:#fff;}
  .set-num{text-align:center;font-weight:700;color:var(--muted);font-size:14px;}
  .set-row.done input{background:var(--green-soft);border-color:#bfe6cc;}
  .check{width:34px;height:38px;border-radius:9px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--faint);background:var(--bg);}
  .set-row.done .check{background:var(--green);color:#fff;border-color:var(--green);}
  .addset{font-size:13px;font-weight:600;color:var(--accent);padding:9px;text-align:center;border:1px dashed var(--line);border-radius:9px;margin-top:6px;}
  .wcell{position:relative;}
  .wcell input{padding-right:40px;}
  .bandbtn{position:absolute;right:4px;top:50%;transform:translateY(-50%);height:26px;padding:0 7px;border-radius:7px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;gap:4px;font-size:10px;font-weight:800;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;}
  .bandbtn .bdot{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:none;}
  .set-bandchip{width:100%;height:38px;border-radius:9px;border:none;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .set-bandchip .pen{opacity:.85;font-size:12px;}
  .failbtn{width:30px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--faint);font-weight:800;font-size:14px;}
  .failbtn.on{background:var(--red);color:#fff;border-color:var(--red);}
  .bandrow{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);}
  .bandrow:active{background:var(--bg);}
  .bandrow .t{font-weight:700;font-size:15px;}.bandrow .mg{font-size:12px;color:var(--muted);}
  .bandsw{width:30px;height:30px;border-radius:8px;flex:none;}
  .band-chips{display:flex;flex-wrap:wrap;gap:6px;margin:-2px 0 8px;}
  .band-chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line);border-radius:100px;padding:5px 10px 5px 7px;background:var(--card);}
  .band-chip .dot{width:13px;height:13px;border-radius:50%;flex:none;}
  .histseg{margin:0 0 14px;}
  .metricpills{display:flex;gap:8px;margin:12px 0 10px;}
  .metricpills button{flex:1;padding:8px;border-radius:100px;font-size:13px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);}
  .metricpills button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 14px 10px;margin-bottom:6px;}
  .chart-card .ch-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
  .chart-card .ch-big{font-size:22px;font-weight:800;letter-spacing:-.01em;}
  .chart-card .ch-date{font-size:13px;font-weight:600;color:var(--accent);}
  .chart-svg{width:100%;height:150px;display:block;margin-top:6px;}
  .chart-x{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);font-weight:600;margin-top:2px;}
  .wkcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:12px;}
  .wkcard:active{background:var(--bg);}
  .wk-h{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
  .wk-title{font-weight:800;font-size:17px;letter-spacing:-.01em;flex:1;}
  .wk-date{font-size:12px;color:var(--faint);font-weight:600;white-space:nowrap;padding-top:3px;}
  .wk-stats{display:flex;gap:18px;padding-bottom:12px;margin-bottom:10px;border-bottom:1px solid var(--line);}
  .wk-stats .k{font-size:11px;color:var(--faint);font-weight:600;margin-bottom:2px;}
  .wk-stats .v{font-size:15px;font-weight:700;}
  .wk-ex{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px;}
  .wk-ex .cnt{color:var(--muted);font-weight:600;min-width:42px;}
  .wk-ex .nm{font-weight:600;}
  .wk-ex .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .wk-more{font-size:13px;color:var(--accent);font-weight:600;margin-top:6px;}
  .body-big{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;text-align:center;}
  .body-big .n{font-size:34px;font-weight:800;letter-spacing:-.02em;}
  .body-big .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
  .body-big .delta{font-size:13px;font-weight:700;margin-top:4px;}
  .delta.up{color:#16a34a;}.delta.down{color:#dc2626;}.delta.flat{color:var(--faint);}
  .meas-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;}
  .meas-row .nm{font-weight:600;font-size:14px;flex:1;}
  .meas-row .val{font-weight:700;font-size:15px;}
  .meas-row .dl{font-size:12px;font-weight:700;min-width:54px;text-align:right;}
  .be-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;}

  .nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:20;}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10px;font-weight:600;padding:4px;}
  .nav button .ic{font-size:20px;line-height:1;}
  .nav button.active{color:var(--accent);}

  .aw-bar{position:sticky;top:0;background:rgba(246,247,249,.92);backdrop-filter:blur(8px);z-index:5;display:flex;align-items:center;gap:10px;padding:12px 0 14px;}
  .aw-bar .timer{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
  .aw-bar .lbl{font-size:11px;color:var(--muted);}
  .aw-bar .spacer{flex:1;}

  .rest{position:absolute;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;padding:12px 16px;display:none;align-items:center;gap:14px;z-index:25;max-width:560px;margin:0 auto;}
  .rest.show{display:flex;}
  .rest .rt{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;}
  .rest .grow{flex:1;}
  .rest .bar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden;margin-top:6px;}
  .rest .fill{height:100%;background:var(--accent);width:100%;transition:width 1s linear;}
  .rest button{font-size:13px;font-weight:700;color:#fff;background:rgba(255,255,255,.16);padding:8px 12px;border-radius:8px;}

  .modal{position:absolute;inset:0;background:rgba(15,21,28,.45);display:none;z-index:40;align-items:flex-end;}
  .modal.open{display:flex;}
  .sheet{background:var(--card);width:100%;max-height:90%;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:up .25s cubic-bezier(.16,1,.3,1);}
  @keyframes up{from{transform:translateY(20px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .sheet-head{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);}
  .sheet-head h3{font-size:17px;font-weight:700;flex:1;}
  .sheet-head .close{font-size:22px;color:var(--muted);padding:0 6px;}
  .sheet-body{overflow-y:auto;padding:14px 16px 28px;}
  .search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:var(--bg);margin-bottom:6px;}
  .search:focus{outline:none;border-color:var(--accent);background:#fff;}
  .pick{display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);}
  .pick:active{background:var(--bg);}.pick .grow{flex:1;}.pick .mg{font-size:12px;color:var(--muted);}
  .muscle-pill{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:5px 11px;border-radius:100px;margin:0 6px 6px 0;}
  .muscle-pill.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-soft);}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px;}
  .stat-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;}
  .stat-box .n{font-size:21px;font-weight:800;letter-spacing:-.01em;}
  .stat-box .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
  .spark{width:100%;height:48px;display:block;margin-top:8px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field input,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:var(--bg);}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  .field.half{display:inline-block;width:calc(50% - 5px);}.field.half:first-child{margin-right:8px;}
  .seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:3px;}
  .seg button{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06);}

  .blk-edit{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--bg);}
  .blk-edit .bh{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .blk-edit .bh .nm{font-weight:700;flex:1;}
  .mini{display:flex;gap:6px;}
  .mini button{font-size:14px;color:var(--muted);padding:4px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);}
  .blk-edit input,.blk-edit textarea,#be-body input,#be-body textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:var(--card);margin-bottom:8px;}
  .blk-edit label,#be-body label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px;}
  .blk-card{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;background:var(--card);}
  .blk-card:active{background:var(--bg);}
  .blk-card .grow{flex:1;min-width:0;}
  .blk-card .bc-t{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .blk-card .bc-meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .blk-card .chev{color:var(--faint);font-size:22px;line-height:1;}
  .two{display:flex;gap:8px;}.two>div{flex:1;}
  .grp-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:14px;}
  .grp-block .ex-block{border:none;background:transparent;padding:0;margin:0 0 10px;}
  .grp-block .ex-block:last-child{margin-bottom:0;}
  .grp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .grp-label{font-weight:800;font-size:15px;color:var(--accent-dark);}
  .grp-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--accent);background:#e7eefe;border-radius:6px;padding:3px 7px;}
  .grp-timer{margin-left:auto;font-size:13px;font-weight:700;color:#fff;background:var(--accent);border-radius:9px;padding:7px 12px;}
  .grp-cap-note{font-size:11px;color:var(--faint);margin:-4px 0 10px;}
  .sbadge{font-size:10px;font-weight:700;color:#9333ea;background:#f3e8ff;border-radius:6px;padding:2px 6px;margin-left:6px;}
  .set-grid.drop input{background:#fff7ed;border-color:#fdba74;}
  .set-num.drop{font-size:9px;font-weight:800;color:#ea580c;text-transform:uppercase;line-height:1.1;}
  .kindseg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:10px;}
  .kindseg button{padding:8px 2px;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);}
  .kindseg button.on{background:var(--accent);color:#fff;}
  .tpills{display:flex;gap:6px;margin-bottom:8px;}
  .tpill{font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:var(--card);}
  .tpill.on{background:#f3e8ff;border-color:#d8b4fe;color:#9333ea;}
  .exc-edit{border-top:1px dashed var(--line);padding-top:10px;margin-top:10px;}
  .exc-edit .eh{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .exc-edit .eh .nm{font-weight:700;flex:1;font-size:14px;}
  .three{display:flex;gap:8px;}.three>div{flex:1;}

  .pr-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--gold-soft);border:1px solid #f0dca0;border-radius:12px;margin-bottom:8px;}
  .pr-row .em{font-size:24px;}
  .pr-row .t{font-weight:700;font-size:15px;}
  .pr-row .s{font-size:12px;color:var(--gold);font-weight:600;}
  .pr-badge{font-size:10px;font-weight:800;color:var(--gold);background:var(--gold-soft);border:1px solid #f0dca0;padding:2px 7px;border-radius:100px;margin-left:6px;}
  .toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .help{font-size:12px;color:var(--muted);line-height:1.6;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:12px;}
  .help code{background:#eef0f3;padding:1px 5px;border-radius:4px;font-size:11px;word-break:break-all;}
  .help ol{margin:8px 0 0 18px;}.help li{margin-bottom:5px;}
  .ck{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--text);padding:4px 2px;}
  .ck input{width:18px;height:18px;}
</style>

<style id="ios-redesign">
:root{
  --bg:#f2f2f7 !important;
  --card:rgba(255,255,255,.88) !important;
  --ink:#0f172a !important;
  --muted:#6b7280 !important;
  --line:rgba(60,60,67,.12) !important;
  --accent:#0a84ff !important;
  --accent-dark:#0066cc !important;
  --accent-soft:#dbeafe !important;
  --radius:22px !important;
  --shadow:0 10px 30px rgba(15,23,42,.06);
}

html{
  background:var(--bg);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter",sans-serif !important;
  background:
    radial-gradient(circle at top, rgba(10,132,255,.08), transparent 30%),
    var(--bg) !important;
  color:var(--ink);
}

#app{
  max-width:100% !important;
  background:transparent !important;
}

.screen{
  padding:
    calc(env(safe-area-inset-top) + 6px)
    16px
    140px !important;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

.topbar{
  position:sticky !important;
  top:0;
  z-index:30;
  margin:0 -16px;
  padding:
    8px 20px 16px !important;
  background:rgba(242,242,247,.72) !important;
  backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.4);
}

.topbar h1{
  font-size:34px !important;
  line-height:1;
  letter-spacing:-0.04em !important;
  font-weight:800 !important;
}

.topbar .sub{
  margin-top:8px !important;
  font-size:14px !important;
}

.gear{
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
}

.card,.wkcard,.chart-card,.body-big,.ex-block,.grp-block,.blk-card,.listitem,.meas-row,.stat-box{
  border:none !important;
  background:var(--card) !important;
  backdrop-filter:blur(24px) saturate(180%);

  return null;
}
function parseScheme(text){

function lastPerformed(exId){
  for(var i=0;i<DB.history.length;i++){var w=DB.history[i];
    for(var j=0;j<w.items.length;j++){if(w.items[j].exId===exId)return w.items[j].sets;}}

function finishWorkout(){
  if(!DB.active)return;
  var done=[];
  DB.active.items.forEach(function(it){
    var ds=it.sets.filter(function(s){return s.done&&s.reps!=='';});
    if(ds.length)done.push({exId:it.exId,glabel:it.glabel||'',gkind:it.gkind||'',sets:ds.map(function(s){var o={weight:effKg(s),reps:parseInt(s.reps)||0,half:!!s.half,band:s.band||'',fail:!!s.fail};if(s.amrap){o.amrap=true;o.ignition=parseInt(s.ignition)||0;}return o;})});
  });
  if(!done.length){if(!confirm('No completed sets. Finish anyway (won\'t be saved)?'))return;stopRest();DB.active=null;save();releaseWake();tab('workout');return;}
  var prs=detectPRs(done);
  var w={id:uid(),name:DB.active.name,date:Date.now(),duration:Math.floor((Date.now()-DB.active.startedAt)/1000),items:done,prs:prs};
  stopRest();DB.history.unshift(w);DB.active=null;save();releaseWake();
  if(DB.settings.strava&&DB.settings.stravaAuto)postToStrava(w);
  if(prs.length)showPRModal(w,prs);else{toast('Workout saved 💪');tab('history');}
}
function priorBests(exId){
  var mw=0,me=0,msv=0,seen=false;
  DB.history.forEach(function(w){w.items.forEach(function(it){if(it.exId===exId)it.sets.forEach(function(s){seen=true;mw=Math.max(mw,s.weight);me=Math.max(me,e1rm(s.weight,s.reps));msv=Math.max(msv,s.weight*s.reps);});});});
  return {mw:mw,me:me,msv:msv,seen:seen};
}
function detectPRs(done){
  var prs=[];
  done.forEach(function(it){
    var p=priorBests(it.exId);if(!p.seen)return;
    var sw=0,se=0,sv=0;
    it.sets.forEach(function(s){sw=Math.max(sw,s.weight);se=Math.max(se,e1rm(s.weight,s.reps));sv=Math.max(sv,s.weight*s.reps);});
    if(sw>p.mw&&sw>0)prs.push({exId:it.exId,type:'weight',value:sw,prev:p.mw});
    if(se>p.me&&se>0)prs.push({exId:it.exId,type:'e1rm',value:se,prev:p.me});
    if(sv>p.msv&&sv>0)prs.push({exId:it.exId,type:'volume',value:sv,prev:p.msv});
  });
  return prs;
}

/* ───────── rest — timestamp-based so it survives screen lock and reload ───────── */
var restInt=null;
function startRest(sec){
  sec=sec||DB.settings.rest;
  if(!DB.active)return;
  DB.active.restEnd=Date.now()+sec*1000;DB.active.restTotal=sec;saveQuiet();
  runRest();
}
function runRest(){
  if(!DB.active||!DB.active.restEnd)return;
  document.getElementById('rest').classList.add('show');
  clearInterval(restInt);restInt=setInterval(restTick,250);restTick();
}
function restTick(){
  var a=DB.active;
  if(!a||!a.restEnd){stopRest();return;}
  var left=Math.max(0,Math.round((a.restEnd-Date.now())/1000));
  document.getElementById('rest-time').textContent=fmtClock(left);
  document.getElementById('rest-fill').style.width=(a.restTotal?(left/a.restTotal*100):0)+'%';
  var st=document.getElementById('aw-rest-stat');if(st)st.textContent=fmtClock(left);
  if(left<=0){
    stopRest();chime();
    try{navigator.vibrate&&navigator.vibrate(200);}catch(e){}
  }
}
function addRest(s){if(!DB.active||!DB.active.restEnd)return;DB.active.restEnd+=s*1000;DB.active.restTotal+=s;saveQuiet();restTick();}
function skipRest(){stopRest();}
function stopRest(){
  clearInterval(restInt);restInt=null;
  if(DB.active&&DB.active.restEnd){DB.active.restEnd=null;saveQuiet();}
  document.getElementById('rest').classList.remove('show');
  if(DB.active&&document.getElementById('s-active').classList.contains('active'))renderAwStats();
}

var MUSCLE_COLORS={Chest:'#ef4444',Back:'#3b82f6',Legs:'#8b5cf6',Shoulders:'#f59e0b',Arms:'#10b981',Core:'#ec4899',Cardio:'#06b6d4'};
function muscleColor(m){return MUSCLE_COLORS[m]||'#94a3b8';}
function chartSVG(vals){
  if(!vals.length)return '';
  var W=320,H=150,padT=12,padB=6;
  var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals),rawMin=min;
  if(max===min){max=max+1;min=min-1;}
  var pad=(max-min)*0.12;max+=pad;min-=pad;if(min<0&&rawMin>=0)min=0;
  var rng=(max-min)||1,ih=H-padT-padB;
  function X(i){return vals.length>1?(i/(vals.length-1))*W:W/2;}
  function Y(v){return padT+ih-((v-min)/rng)*ih;}
  var grid='';for(var g=0;g<3;g++){var gy=padT+ih*(g/2);grid+='<line x1="0" y1="'+gy.toFixed(1)+'" x2="'+W+'" y2="'+gy.toFixed(1)+'" stroke="#eef0f3" stroke-width="1" vector-effect="non-scaling-stroke"/>';}
  var line=vals.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');
  var area='M'+X(0).toFixed(1)+','+Y(vals[0]).toFixed(1)+' '+vals.map(function(v,i){return 'L'+X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ')+' L'+X(vals.length-1).toFixed(1)+','+(padT+ih).toFixed(1)+' L'+X(0).toFixed(1)+','+(padT+ih).toFixed(1)+' Z';
  return '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+grid+'<path d="'+area+'" fill="#2563eb" opacity="0.08"/><polyline fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" points="'+line+'"/></svg>';
}
function metricVal(w){var vol=0,reps=0,sets=0;(w.items||[]).forEach(function(it){(it.sets||[]).forEach(function(s){sets++;vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);reps+=parseInt(s.reps)||0;});});return {volume:vol,duration:w.duration||0,reps:reps,sets:sets};}
function fmtMetric(m,v){if(m==='volume')return Math.round(v).toLocaleString()+' '+u();if(m==='duration')return fmtClock(v);return Math.round(v)+' reps';}
var histMetric='volume';
function setHistMetric(m){histMetric=m;renderWorkoutChart();}
function renderWorkoutChart(){
  var el=document.getElementById('hist-chart');if(!el)return;
  var ws=DB.history.slice().sort(function(a,b){return a.date-b.date;});
  if(ws.length<2){el.innerHTML='';return;}
  var recent=ws.slice(-14);
  var vals=recent.map(function(w){return metricVal(w)[histMetric];});
  var pills='<div class="metricpills">'+['volume','duration','reps'].map(function(m){return '<button class="'+(histMetric===m?'on':'')+'" onclick="setHistMetric(\''+m+'\')">'+m.charAt(0).toUpperCase()+m.slice(1)+'</button>';}).join('')+'</div>';
  el.innerHTML='<div class="chart-card"><div class="ch-top"><span class="ch-big">'+fmtMetric(histMetric,vals[vals.length-1])+'</span><span class="ch-date">'+fmtDate(recent[recent.length-1].date)+'</span></div>'+
    chartSVG(vals)+'<div class="chart-x"><span>'+fmtDate(recent[0].date)+'</span><span>'+fmtDate(recent[recent.length-1].date)+'</span></div>'+pills+'</div>';
}
function histTab(t){
  document.getElementById('ht-workouts').classList.toggle('on',t==='workouts');
  document.getElementById('ht-body').classList.toggle('on',t==='body');

  document.getElementById('hist-body-view').style.display=t==='body'?'':'none';

function fmtDur(sec){sec=Math.max(0,sec|0);var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h?h+'h '+m+'m':m+'m';}
function fmtWhen(ts){
  var d=new Date(ts),now=new Date();
  var t=d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit'});
  if(d.toDateString()===now.toDateString())return 'Today at '+t;
  if(d.toDateString()===new Date(now.getTime()-86400000).toDateString())return 'Yesterday at '+t;
  return fmtDate(ts)+' at '+t;
}
function renderHistory(){
  document.getElementById('hist-sub').textContent=DB.history.length+' workouts';
  var totalVol=0,totalSets=0,totalDur=0;
  DB.history.forEach(function(w){totalDur+=w.duration||0;w.items.forEach(function(it){it.sets.forEach(function(s){totalSets++;totalVol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);});});});
  var volTxt=totalVol>=1000?(Math.round(totalVol/100)/10)+'k':String(Math.round(totalVol));
  function box(n,l){return '<div class="b"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
  document.getElementById('hist-stats').innerHTML=
    box(DB.history.length,'Workouts')+box(volTxt,'Vol '+u())+box(totalSets,'Sets')+box(fmtDur(totalDur),'Duration');
  renderWorkoutChart();
  var c=document.getElementById('hist-list'),prEl=document.getElementById('hist-prs');
  if(!DB.history.length){c.innerHTML='<div class="empty"><div class="big">📈</div>No workouts yet.</div>';if(prEl)prEl.innerHTML='';return;}
  var ws=DB.history.slice().sort(function(a,b){return b.date-a.date;});
  c.innerHTML=ws.map(function(w){
    var mv=metricVal(w);
    var muscles=[];w.items.forEach(function(it){var e=exById(it.exId),m=e?e.muscle:'';if(m&&muscles.indexOf(m)<0)muscles.push(m);});
    var tags=muscles.slice(0,4).join(' · ')||'—';
    return '<div class="wk2" onclick="viewWorkout(\''+w.id+'\')"><div class="ic">🏋️</div>'+
      '<div class="main"><div class="t">'+esc(w.name)+'</div><div class="tags">'+esc(tags)+'</div><div class="date">'+esc(fmtWhen(w.date))+'</div></div>'+
      '<div class="st"><div class="v">'+Math.round(mv.volume).toLocaleString()+'</div><div class="k">Volume</div>'+
      '<div class="row2"><div class="v">'+fmtClock(w.duration||0)+'</div><div class="k">Duration</div></div></div></div>';
  }).join('');
  renderPRStrip();
}
function renderPRStrip(){
  var el=document.getElementById('hist-prs');if(!el)return;
  var map={};
  DB.history.slice().sort(function(a,b){return a.date-b.date;}).forEach(function(w){
    w.items.forEach(function(it){it.sets.forEach(function(s){
      var wt=parseFloat(s.weight)||0;if(wt<=0)return;
      var m=map[it.exId]||(map[it.exId]={best:0,prev:0});
      if(wt>m.best){m.prev=m.best;m.best=wt;}else if(wt>m.prev&&wt<m.best){m.prev=wt;}
    });});
  });
  var arr=Object.keys(map).map(function(id){var e=exById(id);return {name:e?e.name:'?',best:map[id].best,delta:map[id].best-map[id].prev,prev:map[id].prev};});
  arr=arr.filter(function(x){return x.best>0;}).sort(function(a,b){return b.best-a.best;}).slice(0,8);
  if(!arr.length){el.innerHTML='';return;}
  el.innerHTML='<div class="sec-label prs-head"><span>Personal Records</span></div>'+
    '<div class="prs-scroll">'+arr.map(function(p){
      var d=(p.delta>0&&p.prev>0)?'<div class="d">+'+(Math.round(p.delta*10)/10)+' '+u()+'</div>':'<div class="d" style="color:var(--faint)">Best</div>';
      return '<div class="prcard"><div class="nm">'+esc(p.name)+'</div><div class="v">'+p.best+' '+u()+'</div>'+d+'</div>';
    }).join('')+'</div>';
}

function bodyEntries(){return (DB.body||[]).slice().sort(function(a,b){return a.date-b.date;});}
function measureSeries(key){return bodyEntries().filter(function(e){return e.vals&&e.vals[key]!=null&&e.vals[key]!=='';});}
function deltaHtml(cur,prev){if(prev==null)return '<span class="dl">&nbsp;</span>';var d=Math.round((cur-prev)*10)/10;var cls=d>0?'up':d<0?'down':'flat';return '<span class="dl delta '+cls+'">'+(d>0?'+':'')+d+'</span>';}
function renderBody(){

  var ws=measureSeries('weight');
  var head='';

    var cur=ws[ws.length-1].vals.weight, prev=ws.length>1?ws[ws.length-2].vals.weight:null;
    var dtxt='';if(prev!=null){var d=Math.round((cur-prev)*10)/10;var cls=d>0?'up':d<0?'down':'flat';dtxt='<div class="delta '+cls+'">'+(d>0?'+':'')+d+' kg since last</div>';}
    head='<div class="body-big"><div class="n">'+cur+' kg</div><div class="l">Bodyweight · '+fmtDate(ws[ws.length-1].date)+'</div>'+dtxt+'</div>';
    if(ws.length>1)head+='<div class="chart-card"><div class="ch-top"><span class="ch-big">'+cur+' kg</span><span class="ch-date">weight</span></div>'+chartSVG(ws.map(function(e){return e.vals.weight;}))+'<div class="chart-x"><span>'+fmtDate(ws[0].date)+'</span><span>'+fmtDate(ws[ws.length-1].date)+'</span></div></div>';
  }

  }).join('');

}
function viewMeasure(key){
  var m=MEASURES.filter(function(x){return x.key===key;})[0];if(!m)return;
  var s=measureSeries(key),vals=s.map(function(e){return e.vals[key];});

function viewExercise(exId){
  var e=exById(exId);var pts=[];
  DB.history.slice().reverse().forEach(function(w){var top=null;w.items.forEach(function(it){if(it.exId===exId)it.sets.forEach(function(s){if(!top||e1rm(s.weight,s.reps)>top.e)top={e:e1rm(s.weight,s.reps),w:s.weight,r:s.reps};});});if(top)pts.push({date:w.date,e:top.e,w:top.w,r:top.r});});

  var bestE=pts.reduce(function(m,x){return Math.max(m,x.e);},0);
  var spark=sparkline(pts.map(function(x){return x.e;}));
  var hist=pts.slice().reverse().map(function(x){return '<div class="listitem"><div class="grow"><div class="t">'+x.w+' '+u()+' × '+x.r+'</div><div class="s">'+fmtDate(x.date)+' · est 1RM '+x.e+' '+u()+'</div></div></div>';}).join('');

    '<div class="stat-box"><div class="n">'+(p.seen?Math.round(p.msv):'–')+'</div><div class="l">Best set vol</div></div></div>'+
    (pts.length>1?'<div class="card"><div class="sec-label" style="margin:0 0 4px">Estimated 1RM trend</div>'+spark+'</div>':'')+
    '<div class="sec-label">Set history</div>'+(hist||'<div class="empty" style="padding:24px">No logged sets yet</div>')+'</div>');
}
function sparkline(vals){
  if(!vals.length)return '';
  var w=300,h=48,max=Math.max.apply(null,vals),min=Math.min.apply(null,vals),rng=(max-min)||1;
  var pts=vals.map(function(v,i){var x=vals.length>1?(i/(vals.length-1))*w:0;var y=h-4-((v-min)/rng)*(h-8);return x.toFixed(1)+','+y.toFixed(1);});
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" points="'+pts.join(' ')+'"/></svg>';
}

function saveSync(thenSync){
  DB.settings.syncUrl=document.getElementById('syncUrl').value.trim().replace(/\/$/,'');
  DB.settings.syncKey=document.getElementById('syncKey').value.trim();
  DB.settings.syncCode=document.getElementById('syncCode').value.trim();

function syncConfigured(){var s=DB.settings;return s.syncUrl&&s.syncKey&&s.syncCode;}
var autoSyncTimer=null;
function maybeAutoSync(){if(!syncConfigured())return;clearTimeout(autoSyncTimer);autoSyncTimer=setTimeout(function(){syncNow(true);},2500);}
function sbHeaders(){return {'apikey':DB.settings.syncKey,'Authorization':'Bearer '+DB.settings.syncKey,'Content-Type':'application/json'};}
function mergeById(a,b,k){
  a=a||[];b=b||[];var pos={},out=a.slice();
  out.forEach(function(x,i){if(x&&x[k]!=null)pos[x[k]]=i;});
  b.forEach(function(x){
    if(!x||x[k]==null)return;
    var i=pos[x[k]];
    if(i==null){pos[x[k]]=out.length;out.push(x);}
    else if((x.editedAt||0)>(out[i].editedAt||0))out[i]=x; /* edited copies win over stale ones */
  });
  return out;
}
function pruneExercises(){
  var ref={};
  DB.history.forEach(function(w){(w.items||[]).forEach(function(it){if(it.exId!=null)ref[it.exId]=1;});});
  DB.routines.forEach(function(r){(r.groups||[]).forEach(function(g){(g.exercises||[]).forEach(function(x){if(x.exId!=null)ref[x.exId]=1;});});});
  var keep=[],nameSeen={};
  DB.exercises.forEach(function(e){if(ref[e.id]){keep.push(e);nameSeen[(e.name||'').toLowerCase()]=1;}});
  DB.exercises.forEach(function(e){if(ref[e.id])return;var n=(e.name||'').toLowerCase();if(!nameSeen[n]){keep.push(e);nameSeen[n]=1;}});
  DB.exercises=keep;
}
function syncNow(silent){
  if(!syncConfigured()){if(!silent){toast('Enter sync details first');}return;}
  var url=DB.settings.syncUrl+'/rest/v1/lift_sync?code=eq.'+encodeURIComponent(DB.settings.syncCode)+'&select=data';
  fetch(url,{headers:sbHeaders()}).then(function(r){return r.json();}).then(function(rows){
    var d=(rows&&rows[0]&&rows[0].data)||{};
    DB.history=mergeById(DB.history,d.history,'id');
    DB.body=mergeById(DB.body,d.body,'id');DB.body.sort(function(a,b){return a.date-b.date;});
    DB.routines=mergeById(DB.routines,d.routines,'id');DB.routines.forEach(migrateRoutine);
    DB.blocks=mergeById(DB.blocks,d.blocks,'id');
    DB.exercises=mergeById(DB.exercises,d.exercises,'id');
    pruneExercises();
    DB.updatedAt=Date.now();saveQuiet();
    pushSync(silent);refreshAll();
  }).catch(function(e){if(!silent)toast('Sync failed — check connection');});
}
function pushSync(silent){
  var payload={code:DB.settings.syncCode,data:{exercises:DB.exercises,routines:DB.routines,blocks:DB.blocks,history:DB.history,body:DB.body,settings:DB.settings},updated_at:DB.updatedAt||Date.now()};
  fetch(DB.settings.syncUrl+'/rest/v1/lift_sync',{method:'POST',headers:Object.assign(sbHeaders(),{'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify(payload)})
    .then(function(r){if(!r.ok)throw 0;DB.settings.lastSync=Date.now();saveQuiet();if(!silent)toast('Synced ✓ '+DB.history.length+' workouts');})
    .catch(function(e){if(!silent)toast('Sync push failed');});
}

var STRAVA_FN='https://aedzmfogyiusxnvezqgu.supabase.co/functions/v1/strava';
function stravaFetch(body){return fetch(STRAVA_FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});}
function stravaConnect(){
  toast('Opening Strava…');
  stravaFetch({action:'config'}).then(function(d){
    if(!d.client_id){toast('Server not set up yet — add Strava keys in Supabase');return;}
    var redirect=location.origin+location.pathname;
    location.href='https://www.strava.com/oauth/authorize?client_id='+encodeURIComponent(d.client_id)+'&redirect_uri='+encodeURIComponent(redirect)+'&response_type=code&approval_prompt=auto&scope=activity:write';
  }).catch(function(){toast('Could not reach Strava server');});
}
function stravaDisconnect(){DB.settings.strava=null;DB.settings.stravaAuto=false;save();openSettings();}
function stravaHandleRedirect(){
  var p=new URLSearchParams(location.search),code=p.get('code');
  if(!code)return;
  history.replaceState({},'',location.origin+location.pathname);
  if(p.get('error')){toast('Strava connect cancelled');return;}
  stravaFetch({action:'exchange',code:code}).then(function(d){
    if(d.access_token){DB.settings.strava={access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at,athlete:d.athlete||''};DB.settings.stravaAuto=true;save();toast('Connected to Strava ✅');}
    else toast('Strava connect failed');
  }).catch(function(){toast('Strava connect failed');});
}
function stravaToken(cb){
  var s=DB.settings.strava;if(!s){cb(null);return;}
  if(s.expires_at&&s.expires_at*1000>Date.now()+60000){cb(s.access_token);return;}
  stravaFetch({action:'refresh',refresh_token:s.refresh_token}).then(function(d){
    if(d.access_token){s.access_token=d.access_token;s.refresh_token=d.refresh_token;s.expires_at=d.expires_at;save();cb(d.access_token);}else cb(null);
  }).catch(function(){cb(null);});
}
function stravaDescription(w){
  var lines=['Logged with Lifts',''];
  w.items.forEach(function(it){var e=exById(it.exId);lines.push((it.glabel?it.glabel+' ':'')+(e?e.name:'Exercise'));
    it.sets.forEach(function(s,i){lines.push('Set '+(i+1)+': '+s.weight+' '+u()+' x '+s.reps);});lines.push('');});
  if(w.prs&&w.prs.length)lines.push('🏆 '+w.prs.length+' new PB'+(w.prs.length>1?'s':''));
  return lines.join('\n').trim();
}
function postToStrava(w){
  stravaToken(function(tok){
    if(!tok){toast('Strava token expired — reconnect in Settings');return;}
    stravaFetch({action:'post',access_token:tok,name:w.name,elapsed_time:w.duration,start_date_local:new Date(w.date).toISOString().replace('Z',''),description:stravaDescription(w)})
      .then(function(d){toast(d.ok?'Posted to Strava 🏃':'Strava post failed');})
      .catch(function(){toast('Strava post failed');});
  });
}

/* ───────── wake lock + audio cue ───────── */
var wakeLock=null;
function acquireWake(){
  if(!('wakeLock'in navigator)||!DB.active)return;
  navigator.wakeLock.request('screen').then(function(wl){wakeLock=wl;}).catch(function(){});
}
function releaseWake(){if(wakeLock){try{wakeLock.release();}catch(e){}wakeLock=null;}}
var audioCtx=null;
function primeAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
document.addEventListener('touchend',primeAudio,{once:true});
document.addEventListener('click',primeAudio,{once:true});
function chime(){
  if(!audioCtx)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    var t=audioCtx.currentTime+0.02;
    [[880,0],[880,0.2],[1318.5,0.4]].forEach(function(p){
      var o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=p[0];
      g.gain.setValueAtTime(0.0001,t+p[1]);
      g.gain.exponentialRampToValueAtTime(0.5,t+p[1]+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+p[1]+0.18);
      o.connect(g);g.connect(audioCtx.destination);
      o.start(t+p[1]);o.stop(t+p[1]+0.2);
    });
  }catch(e){}
}
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState!=='visible')return;
  if(DB.active){
    acquireWake();
    if(DB.active.restEnd)runRest();
    tickAw();
  }
});

/* ───────── modal/util ───────── */
function openModal(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')closeModal();});
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(function(){t.classList.remove('show');},2200);}
function uniqMuscles(){var m=[];DB.exercises.forEach(function(e){if(m.indexOf(e.muscle)<0)m.push(e.muscle);});return m;}
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtClock(sec){sec=Math.max(0,sec|0);var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h?h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'):m+':'+String(s).padStart(2,'0');}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});}
function fmtDateTime(ts){return new Date(ts).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});}

/* ───────── X-Press Month 2 seed ───────── */
function ensureMonth2(){
  var changed=false;
  function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
  function ex(name,muscle){
    var nn=norm(name),f=DB.exercises.filter(function(e){return norm(e.name)===nn;})[0];
    if(f)return f.id;
    var e={id:uid(),name:name,muscle:muscle||'Other'};DB.exercises.push(e);changed=true;return e.id;
  }
  function exc(id,reps,load,notes){return {exId:id,reps:reps||'',weight:load||'',rir:'',oneHalf:false,dropSet:false,notes:notes||''};}
  function f50(aId,bId){return {id:uid(),kind:'fast50',label:'Fast 50 Warm-up',rounds:1,timeCap:'3:00',rest:30,ladder:'14/12/10/8/6',exercises:[exc(aId,'','Band'),exc(bId,'','Band')]};}
  function amr(id,notes){return {id:uid(),kind:'amrap',label:'',rounds:1,timeCap:'5:00',rest:120,ladder:'',exercises:[exc(id,'AMRAP','10-12 RM',notes)]};}
  function sc(id,reps,load,notes){return {id:uid(),kind:'standard',label:'Systems Check',rounds:1,timeCap:'',rest:DB.settings.rest,ladder:'',exercises:[exc(id,reps,load,notes)]};}
  function ss(label,reps,load,cap,items){return {id:uid(),kind:'superset',label:label,rounds:3,timeCap:cap,rest:DB.settings.rest,ladder:'',exercises:items.map(function(it){return exc(it.id,reps,load,it.notes);})};}

  // shared exercise ids
  var kbIncPress=ex('Kneeling Banded Incline Press','Chest'), bSqueezeRow=ex('Banded Squeeze Rows','Back');
  var anchJumpSquat=ex('Anchored Jump Squats','Legs'), kbHipThrust=ex('Kneeling Banded Hip Thrusts','Legs');
  var bMilPress=ex('Banded Military Press','Shoulders'), bRowUps=ex('Banded Row Ups','Back');
  var bCurls=ex('Banded Curls','Arms'), bOhExt=ex('Banded Overhead Extensions','Arms');
  var dbSpanish=ex('DB Spanish Squats','Legs'), highLowCross=ex('High-to-Low Crossovers','Chest');

  var defs=[
    {id:'xpress-m2-cb3',name:'X-Press: Chest & Back 3',groups:[
      f50(kbIncPress,bSqueezeRow),
      amr(ex('Weighted Dips','Chest')),amr(ex('Crossovers','Chest')),
      amr(ex('Barbell Row','Back')),amr(ex('Lat Pulldown','Back'))]},
    {id:'xpress-m2-legs3',name:'X-Press: Legs 3',groups:[
      f50(anchJumpSquat,kbHipThrust),
      amr(ex('Alternating DB Reverse Lunge','Legs'),'each side'),amr(ex('Barbell RDLs','Legs')),
      amr(dbSpanish),amr(ex('Cable Pull Throughs','Legs'))]},
    {id:'xpress-m2-shoulders3',name:'X-Press: Shoulders & Upper Back 3',groups:[
      f50(bMilPress,bRowUps),
      amr(ex('DB / Barbell OHP → Push Press','Shoulders')),amr(ex('DB Lateral Raises','Shoulders')),
      amr(ex('Face Pulls','Back')),amr(ex('Barbell Shrugs','Shoulders'))]},
    {id:'xpress-m2-arms3',name:'X-Press: Arms 3',groups:[
      f50(bCurls,bOhExt),
      amr(ex('Barbell Curls','Arms')),amr(ex('DB Cross Body Curls','Arms'),'each side'),
      amr(ex('DB JM Press','Arms')),amr(ex('Triceps Pushdowns','Arms'))]},
    {id:'xpress-m2-cb4',name:'X-Press: Chest & Back 4',groups:[
      f50(kbIncPress,bSqueezeRow),
      sc(highLowCross,'10','12 RM','Systems check'),
      ss('High Tensity','6-8/F/F','8 RM','3:00',[{id:highLowCross},{id:ex('Wrap Around Row','Back')}]),
      ss('Mod Tensity','10-12/F/F','12 RM','2:45',[{id:ex('DB Bench Press','Chest')},{id:ex('DB Pullovers','Chest')}]),
      ss('Low Tensity','F','BW','2:45',[{id:ex('Pushups','Chest')},{id:ex('Pullups / Assisted Pullups','Back')}])]},
    {id:'xpress-m2-legs4',name:'X-Press: Legs 4',groups:[
      f50(anchJumpSquat,kbHipThrust),
      sc(dbSpanish,'10','12 RM','Leg Ext swap'),
      ss('High Tensity','6-8/F/F','8 RM','3:00',[{id:dbSpanish},{id:ex('DB RDLs','Legs')}]),
      ss('Mod Tensity','10-12/F/F','12 RM','2:45',[{id:ex('DB Static Creeping Lunge','Legs'),notes:'each side'},{id:ex('DB Frog Press','Legs')}]),
      ss('Low Tensity','F','BW','2:45',[{id:ex('Split Squat Jumps','Legs')},{id:ex('Slick Floor Bridge Hamstring Curls','Legs')}])]},
    {id:'xpress-m2-shoulders4',name:'X-Press: Shoulders & Upper Back 4',groups:[
      f50(bMilPress,bRowUps),
      sc(ex('DB / Barbell Push Press','Shoulders'),'10','12 RM','Systems check'),
      ss('High Tensity','6-8/F/F','8 RM','3:00',[{id:ex('DB / Barbell Push Press','Shoulders')},{id:ex('DB High Pulls','Shoulders')}]),
      ss('Mod Tensity','10-12/F/F','12 RM','2:45',[{id:ex('DB Cheat Laterals','Shoulders'),notes:'each side'},{id:ex('Rear Delt Rows','Back')}]),
      ss('Low Tensity','F','BW','2:45',[{id:ex('Pike Pushups','Shoulders')},{id:ex('Back Widows','Back')}])]},
    {id:'xpress-m2-arms4',name:'X-Press: Arms 4',groups:[
      f50(bCurls,bOhExt),
      sc(ex('Chin Ups','Back'),'2-3 RIR','BW','Systems check'),
      ss('High Tensity','6-8/F/F','8 RM','3:00',[{id:ex('Weighted / Assisted Chin Ups','Back')},{id:ex('Close Grip Bench Press','Arms')}]),
      ss('Mod Tensity','10-12/F/F','12 RM','2:45',[{id:ex('DB Hammer Curls','Arms')},{id:ex('DB / EZ Bar Overhead Extensions','Arms')}]),
      ss('Low Tensity','F','Band','2:45',[{id:ex('Banded Drag Curls','Arms')},{id:ex('Banded Skull Crushers','Arms')}])]}
  ];
  defs.forEach(function(d){
    if(DB.routines.some(function(r){return r.id===d.id;}))return;
    DB.routines.push({id:d.id,name:d.name,notes:'',groups:d.groups});changed=true;
  });
  if(changed)save();
}

/* ───────── boot ───────── */
ensureMonth2();
awTimerInt=setInterval(tickAw,1000);
stravaHandleRedirect();
if(syncConfigured())setTimeout(function(){syncNow(true);},800);
if(DB.active){
  showActive();
  if(DB.active.restEnd){if(DB.active.restEnd>Date.now())runRest();else{DB.active.restEnd=null;saveQuiet();}}
}else{renderWorkoutHome();}
if('serviceWorker'in navigator&&location.protocol==='https:'){try{navigator.serviceWorker.register('lifts-sw.js');}catch(e){}}
</script>

<script id="ios-enhance">
(function(){
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content','#f2f2f7');

  document.addEventListener('focusin',e=>{
    if(e.target.matches('input')){
      setTimeout(()=>e.target.scrollIntoView({block:'center',behavior:'smooth'}),200);
    }
  });

  const observer=new MutationObserver(()=>{
    document.querySelectorAll('.screen').forEach(s=>{
      s.style.webkitOverflowScrolling='touch';
    });
  });
  observer.observe(document.body,{childList:true,subtree:true});
})();
